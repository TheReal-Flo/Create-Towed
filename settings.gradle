pluginManagement {
    repositories {
        gradlePluginPortal()
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

includeBuild('Simulated-Project') {
    dependencySubstitution {
        substitute(module('dev.simulated_team.simulated:neoforge')).using(project(':simulated:neoforge'))
        substitute(module('dev.eriksonn.aeronautics:neoforge')).using(project(':aeronautics:neoforge'))
    }
}
